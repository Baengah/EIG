apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: eig-platform
  labels:
    app: eig-platform
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/eig-platform/eig-web:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          env:
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-url
                  key: latest
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-anon-key
                  key: latest
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-service-key
                  key: latest
            - name: SCRAPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scraper-api-key
                  key: latest
            - name: NEXT_PUBLIC_APP_URL
              value: "https://equityinvestmentgroup.club"
  traffic:
    - percent: 100
      latestRevision: true
